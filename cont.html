<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Barber Prime | Contato</title>
</head>

<body>
    <header class="site-header">
        <a class="brand" href="index.html">Barber Prime</a>

        <nav class="barra" aria-label="Menu principal">
            <ul>
                <li><a href="index.html">In&iacute;cio</a></li>
                <li><a href="agendamento.html">Agendamento</a></li>
                <li><a href="cont.html">Contato</a></li>
                <li><a href="cadrasto.html">Cadastro</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-shell">
    <section class="page-card contato-section">
        <p class="eyebrow">Atendimento</p>
        <h1>Entre em Contato</h1>
        <p class="page-description">
            Tem alguma d&uacute;vida ou deseja agendar um hor&aacute;rio?
            Envie sua mensagem abaixo.
        </p>

        <form>
            <div class="campo">
                <label>Nome:</label>
                <input type="text" placeholder="Digite seu nome">
            </div>
            <div class="campo">
                <label>E-Mail</label>
                <input type="email" placeholder="Digite seu e-mail">
            </div>
            <div class="campo">
                <label>Mensagem:</label>
                <textarea placeholder="Digite sua mensagem"></textarea>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </section>
    </main>

</html>
