<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Barber Prime | Cadastro</title>
</head>

<body>
    <header class="site-header">
        <a class="brand" href="index.html">Barber Prime</a>

        <nav class="barra" aria-label="Menu principal">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="agendamento.html">Agendamento</a></li>
                <li><a href="cont.html">Contato</a></li>
                <li><a href="cadrasto.html">Cadastro</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-shell">
    <section class="page-card cadastro-section">
        <p class="eyebrow">Cliente</p>
        <h1>Faça seu cadastro aqui.</h1>
        <p class="page-description">Crie seu cadastro para agilizar seus próximos agendamentos.</p>

        <form class="cadrasto">
            <div class="campo">
                <label>Nome:</label>
                <input type="text" placeholder="Seu nome">
            </div>
            <div class="campo">
                <label>E-mail:</label>
                <input type="email" placeholder="Seu e-mail">
            </div>
            <div class="campo">
                <label>Senha</label>
                <input type="password" placeholder="Sua senha">
            </div>
            <button id="botao">Enviar</button>
        </form>
    </section>
    </main>
</body>

</html>
